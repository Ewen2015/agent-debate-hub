<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Gateway — Group Debate Agent Hub</title>
    <style id="theme-vars">
:root {
  /* ── Brand ── */
  --claude-brand: #D97757;
  --claude-brand-soft: #E08D6F;
  --claude-brand-light: #F0C6B3;
  --claude-brand-pale: #F8E3D8;
  --claude-brand-deep: #8A5740;
  --claude-brand-dark: #4D3528;

  /* ── Backgrounds ── */
  --bg-base: #FAF9F5;
  --bg-elev: #FFFFFF;
  --bg-soft: #F1F1EF;
  --bg-muted: #E9E6DC;
  --bg-card: rgba(255, 255, 255, 0.82);
  --bg-card-strong: rgba(255, 255, 255, 0.95);
  --bg-sidebar: #F5F4EE;

  /* ── Text ── */
  --text-primary: #1B1B19;
  --text-secondary: #46443B;
  --text-muted: #908E84;
  --text-soft: #6E6D68;
  --text-inverse: #FAF9F5;

  /* ── Borders ── */
  --border-soft: rgba(27, 27, 25, 0.08);
  --border-medium: rgba(27, 27, 25, 0.14);
  --border-strong: rgba(27, 27, 25, 0.22);

  /* ── Accent Colors ── */
  --accent-primary: #D97757;
  --accent-primary-soft: #E08D6F;
  --accent-secondary: #9C87F5;
  --accent-success: #8CA06F;
  --accent-danger: #EF4444;
  --accent-info: #B05730;

  /* ── Shadows ── */
  --shadow-xs: 0 1px 3px 0 rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 6px -2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px -4px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px -6px rgba(0,0,0,0.1);
  --shadow-xl: 0 16px 48px -12px rgba(0,0,0,0.12);

  /* ── Radius ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* ── Typography ── */
  --font-display: 'Newsreader', Georgia, ui-serif, serif;
  --font-sans: 'Poppins', ui-sans-serif, system-ui, sans-serif;
  --font-serif: 'Lora', Georgia, ui-serif, serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
}

.dark {
  /* ── Brand ── */
  --claude-brand: #D97757;
  --claude-brand-soft: #B0683F;
  --claude-brand-light: #8A5740;
  --claude-brand-pale: #3A2A22;
  --claude-brand-deep: #6B4533;
  --claude-brand-dark: #4D3528;

  /* ── Backgrounds ── */
  --bg-base: #1B1B19;
  --bg-elev: #262624;
  --bg-soft: #2C2C2B;
  --bg-muted: #3E3E38;
  --bg-card: rgba(44, 44, 43, 0.85);
  --bg-card-strong: rgba(56, 55, 52, 0.95);
  --bg-sidebar: #1F1E1D;

  /* ── Text ── */
  --text-primary: #FAF9F5;
  --text-secondary: #D8D6CD;
  --text-muted: #908E84;
  --text-soft: #B7B5A9;
  --text-inverse: #1B1B19;

  /* ── Borders ── */
  --border-soft: rgba(250, 249, 245, 0.08);
  --border-medium: rgba(250, 249, 245, 0.14);
  --border-strong: rgba(250, 249, 245, 0.22);

  /* ── Accent Colors ── */
  --accent-primary: #D97757;
  --accent-primary-soft: #B0683F;
  --accent-secondary: #9C87F5;
  --accent-success: #8CA06F;
  --accent-danger: #EF4444;
  --accent-info: #B05730;

  /* ── Shadows ── */
  --shadow-xs: 0 1px 3px 0 rgba(0,0,0,0.2);
  --shadow-sm: 0 2px 6px -2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px -4px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px -6px rgba(0,0,0,0.5);
  --shadow-xl: 0 16px 48px -12px rgba(0,0,0,0.6);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--text-primary);
    --color-secondary: var(--text-secondary);
    --color-muted: var(--text-muted);
  }
  @layer base {
    body { background: var(--text-background); color: var(--text-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>

<body>

  <!-- ====== GATEWAY PANEL ====== -->
  <div class="panel-container">

    <!-- ── Header ── -->
    <div style="padding: 24px 28px 0; display: flex; align-items: flex-start; justify-content: space-between;">
      <div>
        <h1 class="font-display" style="font-size: 24px; font-weight: 500; color: var(--text-primary); margin: 0 0 2px; line-height: 1.25;">
          Model Gateway
        </h1>
        <p style="font-size: 12px; color: var(--text-muted); margin: 0; font-weight: 400; letter-spacing: 0.02em;">
          模型接入配置
        </p>
      </div>
      <!-- Close button -->
      <div style="width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: background 0.15s ease, color 0.15s ease; flex-shrink: 0; margin-top: -2px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/>
        </svg>
      </div>
    </div>

    <!-- ── Body ── -->
    <div class="panel-body">

      <!-- Info text -->
      <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin: 16px 0 0;">
        配置大语言模型（LLM）的接入参数。每个 Agent 将根据配置的 <strong style="color: var(--accent-primary); font-weight: 600;">Provider 优先级</strong> 自动选择可用的模型服务。
      </p>

      <div class="divider"></div>

      <!-- ────────────────────────────────────
           PROVIDER LIST
           ──────────────────────────────────── -->
      <div style="display: flex; flex-direction: column; gap: 10px;">

        <!-- ── Active Provider: Anthropic ── -->
        <div class="provider-card" style="border-color: var(--border-medium);">
          <!-- Provider header row -->
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 14px;">
            <!-- Radio selected -->
            <div class="radio-outer selected">
              <div class="radio-inner"></div>
            </div>
            <!-- Provider info -->
            <div style="flex: 1; min-width: 0;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                <span class="font-sans" style="font-size: 14px; font-weight: 600; color: var(--text-primary);">Anthropic</span>
                <span class="chip chip-active">Active</span>
              </div>
              <span class="font-mono" style="font-size: 11px; color: var(--text-muted);">https://api.anthropic.com</span>
            </div>
            <!-- Chevron down -->
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg);">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </div>

          <!-- Expanded config fields -->
          <div class="config-grid" style="padding-top: 14px; border-top: 1px solid var(--border-soft);">
            <!-- 显示名称 -->
            <div>
              <label class="field-label">显示名称</label>
              <input class="field-input" type="text" value="Anthropic Claude" />
            </div>
            <!-- Base URL -->
            <div>
              <label class="field-label">Base URL</label>
              <input class="field-input" type="text" value="https://api.anthropic.com" />
            </div>
            <!-- API Key (full width) -->
            <div class="full-width">
              <label class="field-label">API Key</label>
              <input class="field-input" type="password" value="sk-ant-••••••••••••••••••••••••" />
            </div>
            <!-- Model -->
            <div>
              <label class="field-label">Model</label>
              <input class="field-input" type="text" value="claude-sonnet-4-20250514" />
            </div>
            <!-- Temperature -->
            <div>
              <label class="field-label">Temperature</label>
              <input class="field-input" type="text" value="0.7" />
            </div>
            <!-- Max Tokens -->
            <div>
              <label class="field-label">Max Tokens</label>
              <input class="field-input" type="text" value="4096" />
            </div>
            <!-- Search toggle checkbox -->
            <div style="display: flex; align-items: center; gap: 8px; padding-top: 18px;">
              <div class="checkbox-visual checked">
                <div class="checkmark"></div>
              </div>
              <span style="font-size: 12px; color: var(--text-secondary); white-space: nowrap;">启用联网搜索</span>
            </div>
            <!-- Test connection button -->
            <div style="display: flex; align-items: flex-end; padding-top: 12px;">
              <button class="btn-primary" type="button">
                <span style="margin-right: 5px;">
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1"/>
                  </svg>
                </span>
                测试连接
              </button>
            </div>
          </div>
        </div>

        <!-- ── Inactive Provider: OpenAI ── -->
        <div class="provider-card">
          <div style="display: flex; align-items: center; gap: 12px;">
            <!-- Radio unselected -->
            <div class="radio-outer">
            </div>
            <!-- Provider info -->
            <div style="flex: 1; min-width: 0;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                <span class="font-sans" style="font-size: 14px; font-weight: 600; color: var(--text-primary);">OpenAI</span>
                <span class="chip chip-inactive">未配置</span>
              </div>
              <span class="font-mono" style="font-size: 11px; color: var(--text-muted);">https://api.openai.com</span>
            </div>
            <!-- Chevron right -->
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 4 10 8 6 12"/>
            </svg>
          </div>
        </div>

        <!-- ── Inactive Provider: Google ── -->
        <div class="provider-card">
          <div style="display: flex; align-items: center; gap: 12px;">
            <!-- Radio unselected -->
            <div class="radio-outer">
            </div>
            <!-- Provider info -->
            <div style="flex: 1; min-width: 0;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                <span class="font-sans" style="font-size: 14px; font-weight: 600; color: var(--text-primary);">Google</span>
                <span class="chip chip-inactive">未配置</span>
              </div>
              <span class="font-mono" style="font-size: 11px; color: var(--text-muted);">https://generativelanguage.googleapis.com</span>
            </div>
            <!-- Chevron right -->
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 4 10 8 6 12"/>
            </svg>
          </div>
        </div>

        <!-- ── Add Provider Button ── -->
        <button class="btn-outline" type="button" style="width: 100%; margin-top: 2px;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/>
          </svg>
          添加新 Provider
        </button>
      </div>

      <div class="divider"></div>

      <!-- ────────────────────────────────────
           SEARCH ENGINE CONFIG
           ──────────────────────────────────── -->
      <div class="search-card">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
          <span class="font-sans" style="font-size: 14px; font-weight: 600; color: var(--text-primary);">联网搜索引擎</span>
          <span class="chip chip-active">已配置</span>
        </div>
        <p style="font-size: 12px; color: var(--text-soft); line-height: 1.6; margin: 0 0 16px;">
          为 Agent 提供实时联网搜索能力。配置至少一个搜索引擎 API Key 即可启用。
        </p>

        <div class="config-grid">
          <!-- Tavily API Key -->
          <div>
            <label class="field-label">Tavily API Key</label>
            <input class="field-input" type="password" value="tvly-••••••••••••••••••••••••" />
          </div>
          <!-- Serper API Key -->
          <div>
            <label class="field-label">Serper API Key</label>
            <input class="field-input" type="password" value="••••••••••••••••••••••••••••••" />
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- ────────────────────────────────────
           RESET BUTTON
           ──────────────────────────────────── -->
      <div style="display: flex; justify-content: center;">
        <button class="btn-ghost" type="button">
          重置 Provider 列表
        </button>
      </div>

    </div><!-- /panel-body -->

  </div><!-- /panel-container -->

</body>
</html>
